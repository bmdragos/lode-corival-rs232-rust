[workspace]
resolver = "2"
members = [
    "lode-protocol",
    # "firmware" will be added once ESP-IDF tooling is set up
]

# Workspace-wide profile settings apply to all member crates.
[profile.release]
opt-level = "s"    # size-optimized for firmware flash
lto = true
codegen-units = 1
debug = true       # keep debug info; stripped at flash time if needed
