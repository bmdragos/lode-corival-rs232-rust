[package]
name = "lode_corival_rs232"
version = "0.1.0"
edition = "2024"
description = "Pure logic + (later) ESP32-C6 firmware for the Lode Corival RS-232 / BLE FTMS bridge, ported from C++."
license = "MIT"

[dependencies]

# Lint settings geared toward a firmware crate.
# Deny unsafe in pure-logic modules; we'll allow it only at hardware-layer boundaries later.
[lints.rust]
unsafe_code = "deny"

[lints.clippy]
# Sensible defaults for embedded-adjacent code.
pedantic = { level = "warn", priority = -1 }
# Allow a few pedantic lints that produce noise without much signal.
module_name_repetitions = "allow"
missing_errors_doc = "allow"
